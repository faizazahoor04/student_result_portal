<!-- templates/admin_login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admin Login | Result Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body class="login-body">
  <div class="login-bg"><div class="lb-blob lb-b1"></div><div class="lb-blob lb-b2"></div></div>
  <div style="position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;">
    <div class="login-card" style="max-width:400px;width:100%;">
      <div class="lc-top">
        <span class="ai-chip">🛡 Admin Access</span>
        <h2 class="lc-title" style="margin-top:.6rem;">Admin Panel</h2>
        <p class="lc-sub">Manage results and send WhatsApp notifications to parents</p>
      </div>
      {% if error %}<div class="alert-error"><span class="alert-icon">⚠</span> {{ error }}</div>{% endif %}
      <form method="POST" class="lc-form">
        <div class="lc-field">
          <label class="lc-label">Admin Password</label>
          <div class="lc-input-wrap">
            <span class="lci-icon">🔒</span>
            <input type="password" name="password" class="lc-input" placeholder="Enter admin password" autofocus/>
          </div>
        </div>
        <button type="submit" class="lc-submit">Enter Admin Panel →</button>
      </form>
      <div class="lc-hint" style="margin-top:1.2rem;">
        <p>👨‍🎓 Student? <a href="/login" style="color:var(--gold);">Go to Student Login →</a></p>
      </div>
    </div>
  </div>
</body>
</html>
